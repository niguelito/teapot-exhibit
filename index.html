<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Utah Teapot Exhibit</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<canvas id="renderCanvas"></canvas>

<!-- pointer-lock prompt (desktop only) -->
<div id="lockOverlay">
  <span>Click to explore the museum</span>
  <small>WASD / Arrow keys · Mouse to look · ESC to exit</small>
</div>

<div id="hud">W A S D to move · Mouse to look · ESC to release cursor</div>
<div id="loadMsg">Loading exhibit…</div>

<!-- mobile joystick -->
<div id="joystickWrap">
  <div id="joystickBase"></div>
  <div id="joystickKnob"></div>
</div>
<div id="lookHintLabel">drag to look</div>
<div id="lookHint"></div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script src="./script.js"></script>
</body>
</html>
